<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 640 640" width="640" height="640" shape-rendering="geometricPrecision">
  <g transform="scale(2)">
  <!-- Background -->
  <rect width="320" height="320" fill="#EDE8DF"/>

  <!-- Drip bag body -->
  <rect x="110" y="90" width="100" height="130" rx="4" fill="none" stroke="#C4924A" stroke-width="1.2"/>

  <!-- Bag top fold line -->
  <line x1="110" y1="110" x2="210" y2="110" stroke="#C4924A" stroke-width="0.8" stroke-dasharray="3,3"/>

  <!-- Drip bag handle (the folded top) -->
  <rect x="125" y="76" width="70" height="16" rx="2" fill="none" stroke="#C4924A" stroke-width="1.2"/>

  <!-- Hook / hang tab -->
  <path d="M155 76 L155 62 Q155 56 160 56 Q165 56 165 62 L165 76" fill="none" stroke="#C4924A" stroke-width="1.2" stroke-linecap="round"/>

  <!-- Filter drip lines at bottom -->
  <line x1="140" y1="220" x2="138" y2="236" stroke="#C4924A" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="160" y1="220" x2="160" y2="240" stroke="#C4924A" stroke-width="0.8" stroke-linecap="round"/>
  <line x1="180" y1="220" x2="182" y2="236" stroke="#C4924A" stroke-width="0.8" stroke-linecap="round"/>

  <!-- Geometric walnut motif — nested ovals -->
  <ellipse cx="160" cy="162" rx="28" ry="22" fill="none" stroke="#C4924A" stroke-width="1"/>
  <ellipse cx="160" cy="162" rx="18" ry="13" fill="none" stroke="#C4924A" stroke-width="0.8"/>
  <ellipse cx="160" cy="162" rx="8" ry="5" fill="#C4924A" opacity="0.35"/>

  <!-- Horizontal dividing line through motif -->
  <line x1="132" y1="162" x2="188" y2="162" stroke="#C4924A" stroke-width="0.6" stroke-dasharray="2,3"/>

  <!-- Label band -->
  <rect x="110" y="118" width="100" height="1" fill="#C4924A" opacity="0.4"/>
  <rect x="110" y="128" width="100" height="1" fill="#C4924A" opacity="0.4"/>

  <!-- Product text -->
  <text x="160" y="140" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="7.5" font-weight="300" fill="#C4924A" letter-spacing="3">NUTTY</text>

  <!-- AMEZ wordmark at bottom of bag — darker + bolder for readability -->
  <text x="160" y="210" text-anchor="middle" font-family="'Cormorant Garamond', Georgia, serif" font-size="8.5" font-weight="600" fill="#2C2416" letter-spacing="4">AMEZ</text>

  <!-- Corner accent dots -->
  <circle cx="115" cy="95" r="1.5" fill="#C4924A" opacity="0.4"/>
  <circle cx="205" cy="95" r="1.5" fill="#C4924A" opacity="0.4"/>
  </g>
</svg>
